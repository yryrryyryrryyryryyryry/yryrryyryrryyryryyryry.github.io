short_bio: >-
  <p>
    I am Jialu Shi, a first year Ph.D. student in mathematics at the University of Cambridge advised by <a href="https://www.dpmms.cam.ac.uk/~pfr26/" target="_blank">Pierre-François Rodriguez</a>.
    I completed my undergraduate studies at Peking University in 2025 with <a href="http://faculty.bicmr.pku.edu.cn/~xinyili/" target="_blank">Xinyi Li</a>.
  </p>
  <p>
    My research interests lie in probability theory and statistical physics, especially in discrete settings. 
    Currently, I am working on models in higher dimensions, e.g. Gaussian Free Field and Random Interlacements.
  </p>

